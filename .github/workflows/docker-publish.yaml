name: Publish images

# Builds and publishes the mail-component container images from this monorepo.
# Each entry in the matrix maps a cmd/<component> to its image on GHCR.
# Start with queue-manager; add components (smtpd, pop3d, imapd, webadmin,
# session-manager, ...) as their Dockerfiles land.
#
# Images publish under this repo's own namespace, ghcr.io/infodancer/maildancer/
# <component>. The flat ghcr.io/infodancer/<component> names belong to the
# pre-consolidation per-component repos (now archived); their packages are owned
# by those repos, so pushing to them 403s. Owning fresh packages here avoids that
# and groups the monorepo's images. Homelab compose points at the new names.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.component }}
    runs-on: [self-hosted, linux, ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: queue-manager
            dockerfile: cmd/queue-manager/Dockerfile
          # Leaf OIDC IdP; replaces the retired auth repo's ghcr.io/infodancer/auth
          # image (frozen pre-monorepo -- deployments must repoint here).
          - component: auth-oidc
            dockerfile: docker/auth-oidc.Dockerfile
          # All-in-one: the whole stack in one container (see docker/all-in-one).
          # The common, obvious deployment; the per-component images above remain
          # for operators who want to isolate each daemon.
          - component: all-in-one
            dockerfile: docker/all-in-one/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/infodancer/maildancer/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
