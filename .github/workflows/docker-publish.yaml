name: Publish images

# Builds and publishes the mail-component container images from this monorepo.
# Each entry in the matrix maps a cmd/<component> to its image name on GHCR.
# Start with queue-manager; add components (smtpd, pop3d, imapd, webadmin,
# session-manager, ...) as their Dockerfiles land.
#
# Images keep their historical names (ghcr.io/infodancer/<component>) so the
# homelab compose files need no change. NOTE: the first push to an existing
# package (created by the now-archived per-component repo) needs that package's
# "Manage Actions access" to grant this repo write -- otherwise the push 403s.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.component }}
    runs-on: [self-hosted, linux, ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: queue-manager
            dockerfile: cmd/queue-manager/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/infodancer/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
