version: '3'

tasks:
  default:
    desc: Run all checks (build, lint, vulncheck, test)
    cmds:
      - task: all

  build:
    desc: Build all packages (library — no binary)
    cmds:
      - go build ./...
    sources:
      - ./**/*.go
      - go.mod
      - go.sum

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vulncheck:
    desc: Run govulncheck for security vulnerabilities
    cmds:
      - govulncheck ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  all:
    desc: Run all checks (build, lint, vulncheck, test)
    cmds:
      - task: build
      - task: lint
      - task: vulncheck
      - task: test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f coverage.out coverage.html

  install:deps:
    desc: Install development dependencies
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install golang.org/x/vuln/cmd/govulncheck@latest

  hooks:install:
    desc: Configure git to use the project hooks directory
    cmds:
      - git config core.hooksPath .githooks
      - echo "Git hooks installed from .githooks directory"
