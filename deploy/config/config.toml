# maildancer shared config — read by smtpd, pop3d, imapd, session-manager,
# queue-manager (each consumes its own sections). Mounted at
# /etc/infodancer/config.toml. This is a local-dev starting point; review
# against each daemon's *.toml.example and config structs before production.

[server]
hostname = "mail.example.com"
# Per-domain directories (config.toml, passwd, keys) and mail data.
domains_path = "/var/mail/domains"
domains_data_path = "/var/mail/domains"
maildir = "/var/mail/domains"

# TLS for the implicit-TLS ports (465/995/993) and for STARTTLS — required for
# authenticated submission. Generate dev certs with deploy/gen-dev-certs.sh,
# uncomment this block, and the certs mount is already wired in docker-compose.yml.
# Inbound plaintext delivery works without it.
# [server.tls]
# cert_file = "/etc/ssl/mail/mail.pem"
# key_file = "/etc/ssl/mail/mail.key"
# min_version = "1.2"

# Shared Redis — greylisting (smtpd) and IMAP notifications (imapd).
[redis]
url = "redis://redis:6379/1"

# session-manager: daemons CONNECT to this socket; session-manager LISTENS on it.
[session-manager]
socket = "/run/infodancer/session-manager.sock"
domains_path = "/var/mail/domains"
domains_data_path = "/var/mail/domains"
mail_session_cmd = "/mail-session"
idle_timeout = "5m"

[session-manager.auth]
agent_type = "passwd"
credential_backend = "passwd"   # passwd filename within each domain dir
key_backend = "keys"            # key store dir within each domain dir

# Outbound queue injection. Required for relaying mail submitted by authenticated
# users — session-manager only registers its OutboundService when dir is set.
# Shares the mailqueue volume with queue-manager, which drains it.
[session-manager.queue]
dir = "/var/spool/mail-queue"
message_ttl = "168h"

[smtpd]
log_level = "info"

# Enables SMTP AUTH so authenticated users can submit outbound mail. smtpd only
# advertises AUTH after STARTTLS (off-localhost), so this needs [server.tls].
[smtpd.auth]
enabled = true

[smtpd.limits]
max_message_size = 26214400  # 25 MB
max_recipients = 100

[smtpd.timeouts]
connection = "5m"
command = "1m"

# Plaintext listeners for no-cert local dev. Add the smtps (465) submission
# listener once TLS is enabled (see [server.tls] above).
[[smtpd.listeners]]
address = ":25"
mode = "smtp"

[[smtpd.listeners]]
address = ":587"
mode = "submission"

[smtpd.metrics]
enabled = true
address = ":9100"
path = "/metrics"

[pop3d]
log_level = "info"

[pop3d.timeouts]
connection = "10m"
command = "1m"
idle = "30m"

[pop3d.limits]
max_connections = 100

[[pop3d.listeners]]
address = ":110"
mode = "pop3"

[pop3d.metrics]
enabled = true
address = ":9101"
path = "/metrics"

[imapd]
log_level = "info"

[[imapd.listeners]]
address = ":143"
mode = "imap"

[imapd.metrics]
enabled = true
address = ":9102"
path = "/metrics"

# Outbound delivery. "direct" does MX-based delivery; set "smarthost" to relay.
[queue-manager]

[queue-manager.outbound]
strategy = "direct"

[queue-manager.queue]
path = "/var/spool/mail-queue"
