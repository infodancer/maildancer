# webadmin config (mounted at /etc/webadmin/webadmin.toml).
[webadmin]
listen_address = "0.0.0.0:8080"
domains_path = "/var/mail/domains"
log_level = "info"

[webadmin.auth]
passwd_file = "/etc/webadmin/admin-passwd"

[webadmin.session]
timeout_minutes = 30

# Optional TLS -- mount certs and uncomment.
# [webadmin.tls]
# cert_file = "/etc/ssl/certs/mail.pem"
# key_file = "/etc/ssl/private/mail.key"
