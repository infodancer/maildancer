version: '3'

vars:
  BINARY: mail-session

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  proto:
    desc: Generate Go code from proto definitions
    cmds:
      - protoc --proto_path=proto --go_out=proto --go_opt=paths=source_relative --go-grpc_out=proto --go-grpc_opt=paths=source_relative mailsession/v1/mailbox.proto mailsession/v1/folders.proto mailsession/v1/delivery.proto mailsession/v1/watch.proto mailsession/v1/outbound.proto
    sources:
      - proto/mailsession/v1/*.proto

  build:
    desc: Build the binary
    deps: [proto]
    cmds:
      - go build -o {{.BINARY}} ./cmd/{{.BINARY}}

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -count=1 ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Check formatting
    cmds:
      - test -z "$(gofmt -l .)"

  fmt:fix:
    desc: Fix formatting
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vulncheck:
    desc: Run govulncheck
    cmds:
      - govulncheck ./...

  check:
    desc: Run all CI checks (test, vet, fmt, lint, vulncheck)
    cmds:
      - task: test
      - task: vet
      - task: fmt
      - task: lint
      - task: vulncheck

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}

  hooks:install:
    desc: Install git hooks (pre-commit and pre-push)
    cmds:
      - cp githooks/pre-commit .git/hooks/pre-commit
      - chmod +x .git/hooks/pre-commit
      - cp githooks/pre-push .git/hooks/pre-push
      - chmod +x .git/hooks/pre-push
    status:
      - test -f .git/hooks/pre-commit
      - diff -q githooks/pre-commit .git/hooks/pre-commit
      - test -f .git/hooks/pre-push
      - diff -q githooks/pre-push .git/hooks/pre-push
