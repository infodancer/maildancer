syntax = "proto3";

package mailsession.v1;

option go_package = "github.com/infodancer/maildancer/internal/mail-session/proto/mailsession/v1";

// OutboundService handles outbound message queue injection.
// Implemented by session-manager to centralize DKIM signing, envelope
// generation, and VERP computation for all protocol daemons (smtpd, sdmp, scmp).
service OutboundService {
  // Enqueue accepts an outbound message and writes it to the mail queue.
  // Client-streaming: the first chunk carries envelope metadata (sender,
  // recipients), subsequent chunks carry the raw message body.
  // No session token required -- access controlled by socket perms / mTLS
  // (same model as DeliveryService).
  rpc Enqueue(stream EnqueueRequest) returns (EnqueueResponse);
}

// EnqueueRequest is client-streaming: metadata first, then body chunks.
message EnqueueRequest {
  oneof payload {
    // First message in the stream carries envelope metadata.
    EnqueueMetadata metadata = 1;

    // Subsequent messages carry raw message body chunks.
    bytes data = 2;
  }
}

// EnqueueMetadata carries the outbound envelope information.
message EnqueueMetadata {
  // Sender is the MAIL FROM address.
  string sender = 1;

  // Recipients is the list of RCPT TO addresses (remote only).
  // One envelope per recipient is written to the queue.
  repeated string recipients = 2;
}

// EnqueueResponse is the outcome of queue injection.
message EnqueueResponse {
  // The assigned RFC 5322 Message-ID.
  string message_id = 1;
}
