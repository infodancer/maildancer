version: '3'

vars:
  BINARY: webadmin

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/{{.BINARY}}

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -count=1 ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Check formatting
    cmds:
      - test -z "$(gofmt -l .)"

  fmt:fix:
    desc: Fix formatting
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vulncheck:
    desc: Run govulncheck
    cmds:
      - govulncheck ./...

  check:
    desc: Run all CI checks (test, vet, fmt, lint, vulncheck)
    cmds:
      - task: test
      - task: vet
      - task: fmt
      - task: lint
      - task: vulncheck

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t infodancer-webadmin:latest .

  docker:run:
    desc: Run webadmin container with temp config and domain directories
    vars:
      CONFIG_PATH:
        sh: mktemp -d -t webadmin-config-XXXXXX
      DOMAINS_PATH:
        sh: mktemp -d -t webadmin-domains-XXXXXX
    cmds:
      - 'echo "Config: {{.CONFIG_PATH}}, Domains: {{.DOMAINS_PATH}}"'
      - |
        docker run -p 8080:8080 \
          -v {{.CONFIG_PATH}}:/etc/infodancer:ro \
          -v {{.DOMAINS_PATH}}:/opt/infodancer/domains \
          infodancer-webadmin:latest

  hooks:install:
    desc: Install git hooks (pre-commit and pre-push)
    cmds:
      - cp githooks/pre-commit .git/hooks/pre-commit
      - chmod +x .git/hooks/pre-commit
      - cp githooks/pre-push .git/hooks/pre-push
      - chmod +x .git/hooks/pre-push
    status:
      - test -f .git/hooks/pre-commit
      - diff -q githooks/pre-commit .git/hooks/pre-commit
      - test -f .git/hooks/pre-push
      - diff -q githooks/pre-push .git/hooks/pre-push
