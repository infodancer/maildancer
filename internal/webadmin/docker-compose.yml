services:
  webadmin:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/etc/webadmin:ro
      - mail-domains:/var/mail/domains
    environment:
      - WEBADMIN_CONFIG=/etc/webadmin/webadmin.toml
    restart: unless-stopped
    networks:
      - mail

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - mail

networks:
  mail:
    external: true

volumes:
  mail-domains:
